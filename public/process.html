<!DOCTYPE html>
<html>
<head>
  <title>Process Image</title>
</head>
<body>
  <h1>Image Processor</h1>
  <canvas id="canvas" style="border: 1px solid red;"></canvas>
  <div id="output" style="margin-top: 20px; font-family: monospace; word-break: break-all; max-height: 200px; overflow-y: scroll; border: 1px solid black; padding: 10px;">Processing...</div>
  <script>
    const img = new Image();
    img.src = "/logo-raw.jpg";
    img.onload = () => {
      console.log("Image loaded", img.width, img.height);
      const canvas = document.getElementById('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      
      const width = canvas.width;
      const height = canvas.height;
      const imgData = ctx.getImageData(0, 0, width, height);
      const data = imgData.data;
      
      const visited = new Uint8Array(width * height);
      const queue = [];
      
      function isWhite(x, y) {
        const idx = (y * width + x) * 4;
        const threshold = 230;
        return data[idx] > threshold && data[idx+1] > threshold && data[idx+2] > threshold;
      }
      
      for (let x = 0; x < width; x++) {
        if (isWhite(x, 0)) {
          const idx = 0 * width + x;
          visited[idx] = 1;
          queue.push([x, 0]);
        }
        if (isWhite(x, height - 1)) {
          const idx = (height - 1) * width + x;
          visited[idx] = 1;
          queue.push([x, height - 1]);
        }
      }
      for (let y = 0; y < height; y++) {
        if (isWhite(0, y)) {
          const idx = y * width + 0;
          visited[idx] = 1;
          queue.push([0, y]);
        }
        if (isWhite(width - 1, y)) {
          const idx = y * width + (width - 1);
          visited[idx] = 1;
          queue.push([width - 1, y]);
        }
      }
      
      let head = 0;
      const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
      while (head < queue.length) {
        const [cx, cy] = queue[head++];
        for (const [dx, dy] of dirs) {
          const nx = cx + dx;
          const ny = cy + dy;
          if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
            const nidx = ny * width + nx;
            if (!visited[nidx] && isWhite(nx, ny)) {
              visited[nidx] = 1;
              queue.push([nx, ny]);
            }
          }
        }
      }
      
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = y * width + x;
          if (visited[idx]) {
            const pIdx = idx * 4;
            data[pIdx+3] = 0;
          }
        }
      }
      
      ctx.putImageData(imgData, 0, 0);
      
      try {
        const dataUrl = canvas.toDataURL('image/png');
        document.getElementById('output').innerText = "Fetching current company info...";
        
        fetch('/api/company-info')
          .then(res => res.json())
          .then(companyInfo => {
            document.getElementById('output').innerText = "Updating company info with logo...";
            companyInfo.logoBase64 = dataUrl;
            
            return fetch('/api/admin/company-info', {
              method: 'PUT',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(companyInfo)
            });
          })
          .then(res => res.json())
          .then(resData => {
            if (resData.success) {
              document.getElementById('output').innerText = "SUCCESS! Transparent logo base64 saved to database.json under companyInfo.logoBase64!";
              console.log("Success:", resData);
            } else {
              document.getElementById('output').innerText = "Server Error: " + resData.error;
              console.error("Server Error:", resData);
            }
          })
          .catch(fetchErr => {
            document.getElementById('output').innerText = "Fetch error: " + fetchErr.message;
            console.error("Fetch error:", fetchErr);
          });
          
      } catch (e) {
        document.getElementById('output').innerText = "Error: " + e.message;
        console.error("Error generating data URL", e);
      }
    };
    img.onerror = (e) => {
      document.getElementById('output').innerText = "Failed to load image. Path tried: " + img.src;
      console.error("Error loading image", e);
    };
  </script>
</body>
</html>
